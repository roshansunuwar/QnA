{% extends 'qna_app/home.html'%}

{% block body_block %}
    <div class="jumbotron">
        <div class="header">
            <h2>{{ questions.question_title }}</h2>
        </div>
        <div class="answer">
            {% for answer in questions.answers_set.all %}
            <p>{{ answer.solution | safe }}</p>
            {% endfor %}
        </div>
    </div>
{% endblock %}
